<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>掌勺点菜</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      (function () {
        var lastTouchEnd = 0

        document.addEventListener(
          'gesturestart',
          function (event) {
            event.preventDefault()
          },
          { passive: false }
        )

        document.addEventListener(
          'dblclick',
          function (event) {
            event.preventDefault()
          },
          { passive: false }
        )

        document.addEventListener(
          'touchend',
          function (event) {
            var now = Date.now()
            if (now - lastTouchEnd <= 300) {
              event.preventDefault()
            }
            lastTouchEnd = now
          },
          { passive: false }
        )

        document.addEventListener(
          'touchmove',
          function (event) {
            if (event.touches && event.touches.length > 1) {
              event.preventDefault()
            }
          },
          { passive: false }
        )
      })()
    </script>
  </body>
</html>
